name: Axonaut Dashboard Update

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  update-dashboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du repo
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Recreate Google service account file
        shell: bash
        run: |
          cat > service-account.json <<'EOF'
          ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          EOF

      - name: Lancer la mise à jour du dashboard
        env:
          AXONAUT_API_KEY: ${{ secrets.AXONAUT_API_KEY }}
          AXONAUT_BASE_URL: ${{ secrets.AXONAUT_BASE_URL }}
        run: python main_v2_dashboard.py
